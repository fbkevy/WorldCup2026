name: Update odds

on:
  schedule:
    # Tick every 30 min. The script (scripts/fetch_odds.py) decides whether to
    # actually call the API: 3x/day baseline + once ~30 min after each game.
    # GitHub Actions minutes are free on public repos; API credits are the limit,
    # so the gating lives in the script, not the cron.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}   # manual run (forces a fetch regardless of schedule)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch odds and update state.json
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          # Manual runs force a fetch; scheduled ticks let the script decide.
          FORCE_FETCH: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: python scripts/fetch_odds.py

      - name: Commit if changed
        run: |
          git config user.name "odds-bot"
          git config user.email "odds-bot@users.noreply.github.com"
          if ! git diff --quiet -- data/state.json; then
            git add data/state.json
            git commit -m "Update odds ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          else
            echo "No odds change."
          fi
