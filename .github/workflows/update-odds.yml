name: Update odds

# Reliability note: GitHub throttles scheduled crons hard (a "*/10" job often
# only fires every 1-2 hours). So instead of relying on the schedule, each run
# LOOPS internally every 5 min for ~55 min, then re-arms the next run via
# workflow_dispatch (which GitHub honours immediately). The hourly schedule is
# just a backstop to restart the chain if it ever breaks.

on:
  schedule:
    - cron: "7 * * * *"     # hourly backstop
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write           # needed to re-arm the next run

concurrency:
  group: update-odds       # at most one running + one pending; no pile-ups
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 58
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Re-arm the next run
        # Dispatch up front so the chain continues even if this run later fails.
        # Concurrency queues it to start right after this ~55-min loop ends.
        run: gh workflow run "Update odds" --repo "$GITHUB_REPOSITORY" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Poll results + odds (every 5 min for ~55 min)
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          git config user.name "odds-bot"
          git config user.email "odds-bot@users.noreply.github.com"
          for i in $(seq 1 11); do
            echo "--- iteration $i ($(date -u '+%H:%M UTC')) ---"
            python scripts/fetch_odds.py || true
            if ! git diff --quiet -- data/; then
              git add data/state.json data/history.json
              git commit -m "Update odds ($(date -u '+%Y-%m-%d %H:%M UTC'))"
              git pull --rebase --autostash origin main || true
              git push || true
            fi
            if [ "$i" -lt 11 ]; then sleep 300; fi
          done
