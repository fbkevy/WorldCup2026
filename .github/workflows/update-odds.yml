name: Update odds

on:
  schedule:
    # 3x/day (UTC): 07:00, 13:00, 19:00
    - cron: "0 7,13,19 * * *"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch odds and update state.json
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/fetch_odds.py

      - name: Commit if changed
        run: |
          git config user.name "odds-bot"
          git config user.email "odds-bot@users.noreply.github.com"
          if ! git diff --quiet -- data/state.json; then
            git add data/state.json
            git commit -m "Update odds ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          else
            echo "No odds change."
          fi
