name: Update odds

on:
  schedule:
    # Tick every 10 min. GitHub heavily throttles frequent scheduled crons, so
    # in practice this fires irregularly (sometimes hours apart) — that's fine:
    # the script catches up ALL unresolved games on whatever run does fire.
    # API credits are plentiful (well under the 500/mo cap), so we check often.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}   # manual run (forces a fetch regardless of schedule)

permissions:
  contents: write

# Never run two updates at once (avoids push races); let the running one finish.
concurrency:
  group: update-odds
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch odds and update state.json
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          # Manual runs force a fetch; scheduled ticks let the script decide.
          FORCE_FETCH: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: python scripts/fetch_odds.py

      - name: Commit if changed
        run: |
          git config user.name "odds-bot"
          git config user.email "odds-bot@users.noreply.github.com"
          if ! git diff --quiet -- data/; then
            git add data/state.json data/history.json
            git commit -m "Update odds ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            # Rebase on any changes pushed meanwhile (e.g. manual edits) so the
            # push can't fail on a moved remote.
            git pull --rebase --autostash origin main || true
            git push
          else
            echo "No odds change."
          fi
