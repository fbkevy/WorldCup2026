<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>World Cup Draw 2026</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <!-- Sticky standings: sidebar on desktop, collapsible top bar on phone -->
  <aside id="standings" class="standings" aria-label="Player standings">
    <button id="standings-toggle" class="standings-toggle" aria-expanded="false">
      <span class="standings-title">Standings</span>
      <span id="standings-peek" class="standings-peek"></span>
      <span class="chevron" aria-hidden="true">▾</span>
    </button>
    <div id="standings-body" class="standings-body">
      <ol id="standings-list" class="standings-list"></ol>
      <p class="alive-line">Alive teams: <span id="alive-count">–</span>/48</p>
      <p class="updated-line">Updated <span id="updated-at">–</span></p>
    </div>
  </aside>

  <main class="bracket-wrap">
    <header class="bracket-head">
      <h1>World Cup Draw 2026</h1>
      <nav id="round-nav" class="round-nav" aria-label="Jump to round"></nav>
    </header>
    <div id="bracket" class="bracket"></div>
  </main>

  <!-- Team detail / player tap sheet -->
  <div id="sheet" class="sheet" hidden>
    <div class="sheet-card">
      <button id="sheet-close" class="sheet-close" aria-label="Close">×</button>
      <div id="sheet-content"></div>
    </div>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
