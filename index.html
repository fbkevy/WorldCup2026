<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>World Cup Draw 2026</title>
  <meta name="description" content="Our 6-player World Cup 2026 draw — live win probabilities and bracket." />
  <meta name="theme-color" content="#0d1117" />
  <!-- Social share preview (WhatsApp / iMessage / etc.) -->
  <meta property="og:title" content="World Cup Draw 2026" />
  <meta property="og:description" content="Who's winning our draw? Live odds-based win probabilities + bracket." />
  <meta property="og:type" content="website" />
  <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22&gt;&lt;text y=%22.9em%22 font-size=%2290%22&gt;⚽&lt;/text&gt;&lt;/svg&gt;" />
  <link rel="stylesheet" href="assets/styles.css?v=8" />
</head>
<body>
  <!-- Sticky standings: sidebar on desktop, collapsible top bar on phone -->
  <aside id="standings" class="standings" aria-label="Player standings">
    <button id="standings-toggle" class="standings-toggle" aria-expanded="false">
      <span class="standings-title">Standings</span>
      <span id="standings-peek" class="standings-peek"></span>
      <span class="chevron" aria-hidden="true">▾</span>
    </button>
    <div id="standings-body" class="standings-body">
      <ol id="standings-list" class="standings-list"></ol>
      <p class="alive-line">Alive teams: <span id="alive-count">–</span>/48</p>
      <p class="updated-line">
        <span id="source-badge" class="badge">–</span>
        Updated <span id="updated-at">–</span>
      </p>
    </div>
  </aside>

  <main class="bracket-wrap">
    <header class="bracket-head">
      <h1>World Cup Draw 2026</h1>
      <div class="head-controls">
        <div id="view-seg" class="view-seg" role="tablist">
          <button data-view="funnel" role="tab">Funnel</button>
          <button data-view="bracket" role="tab">Bracket</button>
          <button data-view="fixtures" role="tab">Fixtures</button>
        </div>
        <button id="sel-chip" class="sel-chip" hidden></button>
        <nav id="round-nav" class="round-nav" aria-label="Jump to round"></nav>
      </div>
    </header>
    <div id="champion" class="champion" hidden></div>
    <div id="bracket" class="bracket"></div>
  </main>

  <!-- Team detail / player tap sheet -->
  <div id="sheet" class="sheet" hidden>
    <div class="sheet-card">
      <button id="sheet-close" class="sheet-close" aria-label="Close">×</button>
      <div id="sheet-content"></div>
    </div>
  </div>

  <script src="assets/app.js?v=8"></script>
</body>
</html>
